# Gruvbox dark256 theme (inlined from egel/tmux-gruvbox, alpha=true)
# Palette: dark256 with 'default' backgrounds for transparency

# --- Status bar ---
set-option -gq status "on"
set-option -gq status-style "bg=default,fg=colour223"
set-option -gq status-justify "left"
set-option -gq status-left-style "none"
set-option -gq status-left-length "80"
set-option -gq status-right-style "none"
set-option -gq status-right-length "80"

set-option -gq status-left "#[bg=colour241,fg=colour248] #S #[bg=colour237,fg=colour241,nobold,noitalics,nounderscore]"
set-option -gq status-right "#[bg=default,fg=colour239,nobold,nounderscore,noitalics]#[bg=colour239,fg=colour246] %Y-%m-%d  %H:%M #[bg=colour239,fg=colour248,nobold,noitalics,nounderscore]#[bg=colour248,fg=colour237] #h #{tmux_mode_indicator}"

# --- Pane borders ---
set-option -gq pane-border-style "fg=#665c54"
set-option -gq pane-active-border-style "fg=#fabd2f"
set-option -gq display-panes-active-colour "colour250"
set-option -gq display-panes-colour "colour237"

# --- Active pane background ---
set-option -gq window-style "bg=default"
set-option -gq window-active-style "bg=#32302f"

# --- Messages ---
set-option -gq message-style "bg=colour239,fg=colour223"
set-option -gq message-command-style "bg=colour248,fg=colour237"

# --- Window status ---
set-window-option -gq window-status-style "bg=default,fg=colour237"
set-window-option -gq window-status-activity-style "bg=colour237,fg=colour248"
set-window-option -gq window-status-current-style "bg=default,fg=colour237"
set-window-option -gq window-status-bell-style "bg=colour167,fg=colour235"
set-window-option -gq window-status-separator ""

# --- Reusable format fragments ---
# Active tab color: zoomed (red) > default (yellow) — no claude-waiting here
set-option -gq @tab-color "#{?window_zoomed_flag,colour167,colour214}"

# Inactive tab color: claude-waiting (blue) > default (grey)
set-option -gq @inactive-tab-color "#{?@claude-waiting,colour109,colour239}"

# Claude waiting indicator (shown only when @claude-waiting is set)
set-option -gq @claude-indicator "#{?@claude-waiting, ●,}"

# Pane count as (N) suffix (shown only when >1 pane)
set-option -gq @pane-dots "#{?#{>:#{window_panes},1}, (#{window_panes}),}"

# Trailing powerline separator: bg adapts to whether this is the last window
set-option -gq @tab-end "#{?window_end_flag,#[bg=default],#[bg=colour237]}"

# --- Window tab formats ---
# Active window: zoom-aware bg color + pane dots
set-window-option -gq window-status-current-format "\
#[bg=#{E:@tab-color},fg=colour237,nobold,noitalics,nounderscore]\
#[bg=#{E:@tab-color},fg=colour239] #I \
#[bg=#{E:@tab-color},fg=colour239,bold] #W#{E:@pane-dots} \
#{E:@tab-end}#[fg=#{E:@tab-color},nobold,noitalics,nounderscore]"

# Inactive window: grey bg, blue when claude is waiting + indicator
set-window-option -gq window-status-format "\
#[bg=#{E:@inactive-tab-color},fg=colour237,noitalics]\
#[bg=#{E:@inactive-tab-color},fg=colour223] #I \
#[bg=#{E:@inactive-tab-color},fg=colour223] #W#{E:@claude-indicator}#{E:@pane-dots} \
#{E:@tab-end}#[fg=#{E:@inactive-tab-color},noitalics]"

# --- Clock ---
set-window-option -gq clock-mode-colour "colour109"
